name: "🕵️‍♂️ Checking compliance"

on:
  push:
    branches: [main]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: read

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --results=verified,unknown --fail

      - name: Check branch name conformance
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          REGEXP='^(feat|fix|docs|infra|chore)\/[0-9]+-[a-z0-9-]+$'
          if [[ ! $BRANCH_NAME =~ $REGEXP ]]; then
            echo "❌ Erreur : Le nom de la branche '$BRANCH_NAME' ne respecte pas le référentiel 002."
            echo "Format attendu : [type]/[issue-id]-[courte-description] (ex: feat/12-add-sso-authentik)"
            exit 1
          fi

      - name: Lint commits format
        uses: wagoid/commitlint-github-action@v6