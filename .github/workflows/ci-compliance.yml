name: "🕵️‍♂️ Checking compliance"

# 1. Déclencheur permettant d'être appelé par d'autres dépôts
on:
  workflow_call:

jobs:
  # --- SCAN DE SÉCURITÉ ---
  security:
    name: TruffleHog Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Indispensable pour scanner l'historique complet (y compris sur les clones de templates)

      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  # --- CONFORMITÉ DE LA BRANCHE ---
  branch-check:
    name: Branch Naming Check
    runs-on: ubuntu-latest
    # On exécute ceci UNIQUEMENT sur les PR. (Une branche 'main' poussée échouerait au test regex).
    if: github.event_name == 'pull_request'
    steps:
      - name: Check branch format
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          REGEXP='^(feat|fix|docs|infra|chore)\/[0-9]+-[a-z0-9-]+$'
          if [[ ! $BRANCH_NAME =~ $REGEXP ]]; then
            echo "❌ NOM DE LA BRANCHE NON CONFORME"
            echo "========================================================================="
            echo "👉 Votre branche actuelle : '$BRANCH_NAME'"
            echo "👉 Format obligatoire : [type]/[issue-id]-[courte-description]"
            echo "👉 Types autorisés : feat, fix, docs, infra, chore"
            echo "========================================================================="
            echo "🛠️ PROCÉDURE DE CORRECTION (À taper sur votre terminal) :"
            echo "1. Renommez votre branche localement :"
            echo "   git branch -m <nouveau-nom-conforme>"
            echo "2. Supprimez l'ancienne branche sur GitHub :"
            echo "   git push origin --delete $BRANCH_NAME"
            echo "3. Poussez la nouvelle branche avec son bon nom :"
            echo "   git push origin -u <nouveau-nom-conforme>"
            echo "========================================================================="
            exit 1
          fi

  # --- CONFORMITÉ DES COMMITS ---
  commit-lint:
    name: Commitlint Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint commits
        id: run_commitlint
        uses: wagoid/commitlint-github-action@v6
        continue-on-error: true

      - name: Custom Commit Procedure Logs
        if: steps.run_commitlint.outcome == 'failure'
        run: |
          echo "❌ NOM DU COMMIT NON CONFORME"
          echo "========================================================================="
          echo "👉 Format obligatoire : <type>(<scope>): <description courte>"
          echo "👉 Exemple : feat(ansible): ajout du role de deploiement apache"
          echo "========================================================================="
          echo "🛠️ PROCÉDURE DE CORRECTION (Si c'est le TOUT DERNIER commit de votre branche) :"
          echo "1. Modifiez le message de votre dernier commit local :"
          echo "   git commit --amend -m 'type(scope): votre nouveau message conforme'"
          echo "2. Mettez à jour votre Pull Request de force :"
          echo "   git push --force-with-lease"
          echo "========================================================================="
          exit 1
